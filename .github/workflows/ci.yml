name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x' # using 1.25.x matching go.mod

      - name: Run Tests
        run: go test -v ./...

      - name: Check Formatting
        run: test -z $(go fmt ./...)
